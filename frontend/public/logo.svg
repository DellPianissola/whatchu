<svg version="1.1" id="Layer_1" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" x="0px" y="0px"
	 width="100%" viewBox="0 0 160 112" enable-background="new 0 0 160 112" xml:space="preserve">
  <defs>
    <!-- Roxo vertical: pessoas laterais -->
    <linearGradient id="grad-side" x1="0" y1="0" x2="0" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#c084fc"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>

    <!-- Roxo→âmbar horizontal: arco central (flui da esquerda pra direita) -->
    <linearGradient id="grad-arc" x1="40" y1="0" x2="141" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#a855f7"/>
      <stop offset="55%"  stop-color="#c084fc"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>

    <!-- Roxo→âmbar diagonal: cabeça central (elemento de destaque) -->
    <linearGradient id="grad-center-head" x1="76" y1="22" x2="108" y2="54" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>

    <!-- Âmbar vertical: botão play -->
    <linearGradient id="grad-play" x1="0" y1="0" x2="0" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
  </defs>

