server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Compressão gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_min_length 1024;

    # Limite de upload (avatares/posters via MinIO presigned)
    client_max_body_size 10M;

    # Proxy reverso pro backend — /api/* vai pro container backend:5000
    # Vantagens: backend não fica exposto à internet, sem CORS, mesmo domínio.
    location /api/ {
        proxy_pass http://backend:5000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # Proxy pro MinIO — /storage/* vai pro container minio:9000
    # MINIO_PUBLIC_URL no backend deve ser https://whatchu.pianissola.tech/storage
    location /storage/ {
        proxy_pass http://minio:9000/;
        proxy_http_version 1.1;
        proxy_set_header Host minio:9000;
        proxy_set_header X-Real-IP $remote_addr;
        # Cache de imagens no browser (posters não mudam)
        expires 7d;
        add_header Cache-Control "public";
    }

    # Assets com cache longo (Vite gera nomes com hash)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Fallback SPA — qualquer rota que não seja arquivo serve o index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
