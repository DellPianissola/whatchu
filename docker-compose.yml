services:
  postgres:
    image: postgres:16-alpine
    container_name: whatchu-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=whatchu
      - POSTGRES_PASSWORD=whatchu
      - POSTGRES_DB=whatchu
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U whatchu"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: whatchu-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    volumes:
      - ./backend:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
      - PORT=5000
      - DATABASE_URL=postgresql://whatchu:whatchu@postgres:5432/whatchu
    env_file:
      - ./backend/.env
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - app-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: whatchu-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=http://localhost:5000/api
    depends_on:
      - backend
    networks:
      - app-network

  # Container exclusivo pro banco de testes. Só sobe com --profile test.
  # Porta diferente (5433) pra não colidir com o postgres de dev.
  postgres-test:
    image: postgres:16-alpine
    container_name: whatchu-db-test
    profiles: [test]
    ports:
      - "5433:5432"
    environment:
      - POSTGRES_USER=whatchu
      - POSTGRES_PASSWORD=whatchu
      - POSTGRES_DB=whatchu_test
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U whatchu"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

volumes:
  postgres_data:

networks:
  app-network:
    driver: bridge
