services:
  postgres:
    image: postgres:16-alpine
    container_name: whatchu-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=${DB_NAME}
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  minio:
    image: minio/minio:latest
    container_name: whatchu-minio
    restart: unless-stopped
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data
    environment:
      - MINIO_ROOT_USER=${MINIO_ACCESS_KEY}
      - MINIO_ROOT_PASSWORD=${MINIO_SECRET_KEY}
    command: server /data --console-address ":${MINIO_CONSOLE_PORT:-9001}"
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  minio-setup:
    image: minio/mc:latest
    container_name: whatchu-minio-setup
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      sh -c "
      mc alias set local http://minio:$$MINIO_PORT $$MINIO_ROOT_USER $$MINIO_ROOT_PASSWORD &&
      mc mb --ignore-existing local/${MINIO_BUCKET} &&
      mc anonymous set download local/${MINIO_BUCKET} &&
      echo 'MinIO bucket pronto.'
      "
    environment:
      - MINIO_ROOT_USER=${MINIO_ACCESS_KEY}
      - MINIO_ROOT_PASSWORD=${MINIO_SECRET_KEY}
      - MINIO_BUCKET=${MINIO_BUCKET}
      - MINIO_PORT=${MINIO_PORT:-9000}
    networks:
      - app-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: whatchu-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    volumes:
      - ./backend:/app
      - backend_node_modules:/app/node_modules
    command: sh -c "npm install --silent && ./start.sh"
    environment:
      - NODE_ENV=development
      - PGHOST=${DB_HOST:-postgres}
      - PGPORT=${DB_PORT:-5432}
      - DATABASE_URL=postgresql://${DB_USER}:${DB_PASSWORD}@${DB_HOST:-postgres}:${DB_PORT:-5432}/${DB_NAME}
    env_file:
      - ./backend/.env
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - app-network

  frontend:
    image: node:20-alpine
    container_name: whatchu-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    working_dir: /app
    command: sh -c "npm install --silent && npm run dev"
    environment:
      - VITE_API_URL=${VITE_API_URL}
    depends_on:
      - backend
    networks:
      - app-network

  postgres-test:
    image: postgres:16-alpine
    container_name: whatchu-db-test
    profiles: [test]
    ports:
      - "5433:5432"
    environment:
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=${DB_NAME}_test
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  backend-test:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: whatchu-backend-test
    profiles: [test]
    volumes:
      - ./backend:/app
      - backend_test_node_modules:/app/node_modules
    working_dir: /app
    command: sh -c "npm install --silent && npm run test:all"
    environment:
      - NODE_ENV=test
      - TEST_DATABASE_URL=postgresql://${DB_USER}:${DB_PASSWORD}@postgres-test:5432/${DB_NAME}_test
      - DATABASE_URL=postgresql://${DB_USER}:${DB_PASSWORD}@postgres-test:5432/${DB_NAME}_test
      - JWT_SECRET=${JWT_SECRET_TEST:-docker-test-secret-nao-usar-em-producao}
    env_file:
      - ./backend/.env
    depends_on:
      postgres-test:
        condition: service_healthy
    networks:
      - app-network

volumes:
  postgres_data:
  minio_data:
  backend_node_modules:
  backend_test_node_modules:
  frontend_node_modules:

networks:
  app-network:
    driver: bridge
